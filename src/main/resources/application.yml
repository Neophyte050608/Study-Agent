# 主配置文件 (Git 托管)
# 包含公共业务逻辑、模型选型以及非敏感的基础设施配置。

server:
  port: 9596

spring:
  application:
    name: interview-review
  config:
    # 强制导入私密配置文件 (不存入 Git)
    import: optional:file:./application-private.yml
  ai:
    # 1. 配置 DeepSeek 用于 Chat (对话、分析、提问)
    openai:
      base-url: https://api.deepseek.com
      chat:
        options:
          model: deepseek-chat
      embedding:
        enabled: false # 禁用 OpenAI Embedding
    
    # 2. 配置 ZhiPu (智谱) 用于 Embedding (向量化中文笔记)
    zhipuai:
      chat:
        enabled: false # 禁用 ZhiPu Chat
      embedding:
        enabled: true
        options:
          model: embedding-3 # 维度 2048
          
    vectorstore:
      milvus:
        initialize-schema: true
        client:
          host: localhost
          port: 19530
        embedding-dimension: 2048
        collection:
          name: interview_notes
    retry:
      max-attempts: 1
  
  main:
    web-application-type: servlet
  
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
  
  datasource:
    url: jdbc:mysql://localhost:3307/interview_review?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:MIQI6666}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: InterviewReviewHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  
  http:
    client:
      connect-timeout: 10s
      read-timeout: 90s
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:MIQI6666}
      timeout: 2s

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    org.springframework.ai: DEBUG
    org.springframework.ai.retry.autoconfigure.SpringAiRetryAutoConfiguration: ERROR
    org.springframework.data.neo4j.cypher.deprecation: ERROR

rocketmq:
  producer:
    group: ${ROCKETMQ_PRODUCER_GROUP:interview-review-a2a-producer}

app:
  observability:
    rag-trace-enabled: ${APP_OBSERVABILITY_RAG_TRACE_ENABLED:true}
    retrieval-eval-enabled: ${APP_OBSERVABILITY_RETRIEVAL_EVAL_ENABLED:true}

  a2a:
    bus:
      type: ${APP_A2A_BUS_TYPE:inmemory} # 默认内存，私密配置中可重写为 rocketmq
    idempotency:
      ttl-seconds: ${APP_A2A_IDEMPOTENCY_TTL_SECONDS:300}
      max-size: ${APP_A2A_IDEMPOTENCY_MAX_SIZE:20000}
      backend: ${APP_A2A_IDEMPOTENCY_BACKEND:auto}
      redis-key-prefix: ${APP_A2A_IDEMPOTENCY_REDIS_KEY_PREFIX:a2a:idempotency:}
    rocketmq:
      topic: ${APP_A2A_ROCKETMQ_TOPIC:a2a-events}
      consumer-group: ${APP_A2A_ROCKETMQ_CONSUMER_GROUP:interview-review-a2a-consumer}
      dlq-topic: ${APP_A2A_ROCKETMQ_DLQ_TOPIC:a2a-events-dlq}
      publish-retries: ${APP_A2A_ROCKETMQ_PUBLISH_RETRIES:2}
      retry-backoff-ms: ${APP_A2A_ROCKETMQ_RETRY_BACKOFF_MS:120}
  
  learning:
    notes:
      dir: ${APP_LEARNING_NOTES_DIR:learning-notes}
  ingestion:
    config:
      paths: ${APP_INGESTION_CONFIG_PATHS:}
      ignore-dirs: ${APP_INGESTION_CONFIG_IGNORE_DIRS:}

  interview:
    streaming:
      enabled: ${APP_INTERVIEW_STREAMING_ENABLED:true}
      timeout-millis: ${APP_INTERVIEW_STREAMING_TIMEOUT_MILLIS:180000}
      message-chunk-size: ${APP_INTERVIEW_STREAMING_MESSAGE_CHUNK_SIZE:48}

  chat:
    streaming:
      timeout-millis: 180000
      message-chunk-size: 48

  model-routing:
    enabled: ${APP_MODEL_ROUTING_ENABLED:true}
    default-model: ${APP_MODEL_ROUTING_DEFAULT_MODEL:deepseek-chat}
    deep-thinking-model: ${APP_MODEL_ROUTING_DEEP_THINKING_MODEL:deepseek-reasoner}
    candidates:
      - name: deepseek-chat
        provider: openai
        model: deepseek-chat
        bean-name: openAiChatModel
        enabled: true
        priority: 10
        supports-thinking: false
      - name: deepseek-reasoner
        provider: openai
        model: deepseek-reasoner
        bean-name: openAiChatModel
        enabled: true
        priority: 20
        supports-thinking: true
    circuit-breaker:
      failure-threshold: ${APP_MODEL_ROUTING_FAILURE_THRESHOLD:3}
      open-duration-ms: ${APP_MODEL_ROUTING_OPEN_DURATION_MS:30000}
      half-open-max-trials: ${APP_MODEL_ROUTING_HALF_OPEN_MAX_TRIALS:1}
    stream:
      first-packet-timeout-ms: ${APP_MODEL_ROUTING_FIRST_PACKET_TIMEOUT_MS:6000}
      first-packet-min-chars: ${APP_MODEL_ROUTING_FIRST_PACKET_MIN_CHARS:1}
      buffer-chunk-size: ${APP_MODEL_ROUTING_BUFFER_CHUNK_SIZE:32}

  intent-tree:
    enabled: ${APP_INTENT_TREE_ENABLED:true}
    confidence-threshold: ${APP_INTENT_TREE_CONFIDENCE_THRESHOLD:0.60}
    min-gap: ${APP_INTENT_TREE_MIN_GAP:0.12}
    ambiguity-ratio: ${APP_INTENT_TREE_AMBIGUITY_RATIO:0.80}
    clarification-ttl-minutes: ${APP_INTENT_TREE_CLARIFICATION_TTL_MINUTES:10}
    max-candidates: ${APP_INTENT_TREE_MAX_CANDIDATES:3}
    fallback-to-legacy-task-router: ${APP_INTENT_TREE_FALLBACK_TO_LEGACY:true}
  
  rag:
    retrieval:
      lexical-search-mode: ${APP_RAG_RETRIEVAL_LEXICAL_SEARCH_MODE:AUTO}
      web-fallback-mode: ${APP_RAG_RETRIEVAL_WEB_FALLBACK_MODE:ON_EMPTY}
      web-fallback-quality-threshold: ${APP_RAG_RETRIEVAL_WEB_FALLBACK_QUALITY_THRESHOLD:0.10}
    chunking:
      strategy: ${APP_RAG_CHUNKING_STRATEGY:STRUCTURE_RECURSIVE_WITH_METADATA}
      target-size: ${APP_RAG_CHUNKING_TARGET_SIZE:550}
      max-size: ${APP_RAG_CHUNKING_MAX_SIZE:800}
      overlap: ${APP_RAG_CHUNKING_OVERLAP:80}
      heading-levels: ${APP_RAG_CHUNKING_HEADING_LEVELS:3}
      metadata-prefix-enabled: ${APP_RAG_CHUNKING_METADATA_PREFIX_ENABLED:true}
      fallback-token-split-enabled: ${APP_RAG_CHUNKING_FALLBACK_TOKEN_SPLIT_ENABLED:true}
      include-source-type: ${APP_RAG_CHUNKING_INCLUDE_SOURCE_TYPE:true}
      include-knowledge-tags: ${APP_RAG_CHUNKING_INCLUDE_KNOWLEDGE_TAGS:true}
    parent-child:
      enabled: ${APP_RAG_PARENT_CHILD_ENABLED:true}
      child-target-size: ${APP_RAG_PARENT_CHILD_CHILD_TARGET_SIZE:220}
      child-overlap: ${APP_RAG_PARENT_CHILD_CHILD_OVERLAP:40}
      parent-max-size: ${APP_RAG_PARENT_CHILD_PARENT_MAX_SIZE:1200}
      hydrate-parent-top-n: ${APP_RAG_PARENT_CHILD_HYDRATE_PARENT_TOP_N:8}
      hydrate-parent-context-chars: ${APP_RAG_PARENT_CHILD_HYDRATE_PARENT_CONTEXT_CHARS:420}
      hydrate-child-match-chars: ${APP_RAG_PARENT_CHILD_HYDRATE_CHILD_MATCH_CHARS:180}
      fallback-to-flat-retrieval: ${APP_RAG_PARENT_CHILD_FALLBACK_TO_FLAT_RETRIEVAL:false}

  mcp:
    timeout-millis: ${APP_MCP_TIMEOUT_MILLIS:1500}
    retries: ${APP_MCP_RETRIES:2}
    mode: ${APP_MCP_MODE:stub}
    fallback-to-stub: ${APP_MCP_FALLBACK_TO_STUB:true}
    fastmcp:
      enabled: ${APP_MCP_FASTMCP_ENABLED:false}
      base-url: ${APP_MCP_FASTMCP_BASE_URL:http://localhost:38190}
      endpoint-path: ${APP_MCP_FASTMCP_ENDPOINT_PATH:/mcp}
      transport: ${APP_MCP_FASTMCP_TRANSPORT:streamable}
    database:
      neo4j:
        enabled: ${APP_MCP_DB_NEO4J_ENABLED:false}
      milvus:
        enabled: ${APP_MCP_DB_MILVUS_ENABLED:false}
    bridge:
      enabled: ${APP_MCP_BRIDGE_ENABLED:false}
      base-url: ${APP_MCP_BRIDGE_BASE_URL:http://localhost:38080}
      capabilities-path: ${APP_MCP_BRIDGE_CAPABILITIES_PATH:/capabilities}
      invoke-path: ${APP_MCP_BRIDGE_INVOKE_PATH:/invoke}
    sse:
      enabled: ${APP_MCP_SSE_ENABLED:false}
      base-url: ${APP_MCP_SSE_BASE_URL:http://localhost:38180}
      endpoint-path: ${APP_MCP_SSE_ENDPOINT_PATH:/mcp}
    stdio:
      enabled: ${APP_MCP_STDIO_ENABLED:false}
      command: ${APP_MCP_STDIO_COMMAND:}
      args: ${APP_MCP_STDIO_ARGS:}
      timeout-millis: ${APP_MCP_STDIO_TIMEOUT_MILLIS:3000}
    filescope:
      # 开发态依赖分析工具 (dev 环境启用)
      enabled: ${APP_MCP_FILESCOPE_ENABLED:false}
      base-url: ${APP_MCP_FILESCOPE_BASE_URL:http://localhost:38200}
      capability-dependency-graph: ${APP_MCP_FILESCOPE_CAP_DEP_GRAPH:filescope.dependency.graph}
      capability-symbol-search: ${APP_MCP_FILESCOPE_CAP_SYMBOL_SEARCH:filescope.symbol.search}
  
  agent:
    skills:
      paths: ${APP_AGENT_SKILLS_PATHS:skills}
  
  security:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:8080,http://localhost:9596,http://localhost:5173,http://127.0.0.1:5173}

im:
  qq:
    # QQ 接入配置
    use-ws: true
  feishu:
    # 飞书接入配置
    use-ws: true
