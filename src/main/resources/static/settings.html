<!-- Success Toast Container -->
<div class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3" id="toast-container"></div>
<script>
        // On page load, fetch configurations
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/settings/agents');
                if (res.ok) {
                    const data = await res.json();
                    bindConfigToUI('EvaluationAgent', 'card-eval', data['EvaluationAgent']);
                    bindConfigToUI('DecisionLayerAgent', 'card-decision', data['DecisionLayerAgent']);
                    bindConfigToUI('LearningProfileAgent', 'card-profile', data['LearningProfileAgent']);
                }
            } catch (e) {
                console.error("Failed to load configs", e);
            }
        });

        function bindConfigToUI(agentKey, cardId, config) {
            if (!config) return;
            const card = document.getElementById(cardId);
            if (!card) return;

            card.dataset.agent = agentKey;

            const enabledCheckbox = card.querySelector('input[type="checkbox"]');
            const providerSelect = card.querySelector('select');
            const modelInput = card.querySelector('input[type="text"]');
            const keyInput = card.querySelector('input[type="password"]');
            const tempInput = card.querySelector('input[type="range"]');
            const tempValDisplay = card.querySelector('span[id^="val-"]');

            if (enabledCheckbox) {
                enabledCheckbox.checked = config.enabled;
                toggleAgent(cardId, enabledCheckbox);
            }
            if (providerSelect) providerSelect.value = config.provider || 'OPENAI';
            if (modelInput) modelInput.value = config.modelName || '';
            if (keyInput) keyInput.value = config.apiKey || '';
            if (tempInput) {
                tempInput.value = config.temperature || 0.7;
                if (tempValDisplay) tempValDisplay.innerText = tempInput.value;
            }
        }

        function extractConfigFromUI(cardId) {
            const card = document.getElementById(cardId);
            if (!card) return null;

            const enabledCheckbox = card.querySelector('input[type="checkbox"]');
            const providerSelect = card.querySelector('select');
            const modelInput = card.querySelector('input[type="text"]');
            const keyInput = card.querySelector('input[type="password"]');
            const tempInput = card.querySelector('input[type="range"]');

            return {
                enabled: enabledCheckbox ? enabledCheckbox.checked : true,
                provider: providerSelect ? providerSelect.value : 'OPENAI',
                modelName: modelInput ? modelInput.value : '',
                apiKey: keyInput ? keyInput.value : '',
                temperature: tempInput ? parseFloat(tempInput.value) : 0.7
            };
        }

        function toggleAgent(cardId, checkbox) {
            const card = document.getElementById(cardId);
            if (checkbox.checked) {
                card.classList.remove('agent-card-disabled');
            } else {
                card.classList.add('agent-card-disabled');
            }
        }

        async function saveAction(btn) {
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>正在保存...</span>
            `;

            const configs = {};
            const cards = ['card-eval', 'card-decision', 'card-profile'];
            const keys = ['EvaluationAgent', 'DecisionLayerAgent', 'LearningProfileAgent'];
            
            for (let i = 0; i < cards.length; i++) {
                const conf = extractConfigFromUI(cards[i]);
                if (conf) {
                    configs[keys[i]] = conf;
                }
            }

            try {
                const res = await fetch('/api/settings/agents', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(configs)
                });
                
                if (res.ok) {
                    showToast('配置已成功保存！', 'success');
                } else {
                    showToast('保存失败，请重试', 'error');
                }
            } catch (e) {
                console.error(e);
                showToast('保存异常', 'error');
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        }

        function showToast(message, type) {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let colorClass = type === 'success' ? 'border-emerald-500' : 'border-red-500';
            let iconClass = type === 'success' ? 'text-emerald-500' : 'text-red-500';
            let iconName = type === 'success' ? 'check_circle' : 'error';

            toast.className = `flex items-center gap-3 bg-white px-6 py-4 rounded-xl shadow-2xl border-l-4 ${colorClass} animate-fade-in transition-all translate-y-10 opacity-0`;
            
            toast.innerHTML = `
                <span class="material-symbols-outlined ${iconClass}">${iconName}</span>
                <p class="text-sm font-semibold text-slate-800">${message}</p>
            `;
            
            container.appendChild(toast);
            
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            });

            setTimeout(() => {
                toast.classList.add('translate-y-[-10px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }
    </script>
