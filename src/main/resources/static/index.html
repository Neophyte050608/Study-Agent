<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试复盘助手</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; color: #333; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 90%; max-width: 600px; text-align: center; }
        h1 { color: #2c3e50; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; text-align: left; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; }
        input[type="text"], input[type="number"] { width: 100%; padding: 0.8rem; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background-color: #3498db; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: background 0.3s; margin-top: 1rem; }
        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .hidden { display: none; }
        #question-area { margin: 2rem 0; }
        #question-text { font-size: 1.2rem; font-weight: bold; color: #2c3e50; min-height: 3rem; }
        #timer { font-size: 2rem; color: #e74c3c; font-weight: bold; margin: 1rem 0; }
        #status { color: #7f8c8d; font-style: italic; margin-bottom: 1rem; }
        #score-area { margin-top: 2rem; padding-top: 1rem; border-top: 1px solid #eee; }
        .score-bar { height: 10px; background: #eee; border-radius: 5px; overflow: hidden; margin: 1rem 0; }
        .score-fill { height: 100%; background: #2ecc71; width: 0%; transition: width 0.5s ease; }
        #feedback-text { font-weight: bold; color: #27ae60; }
        #progress-text { color: #34495e; margin-top: 0.5rem; }
        #final-report { margin-top: 1.5rem; padding: 1rem; border: 1px solid #eee; border-radius: 8px; text-align: left; background: #fafafa; }
        #final-report h3 { margin: 0.8rem 0 0.5rem; color: #2c3e50; }
        #final-report p { margin: 0.4rem 0; white-space: pre-wrap; line-height: 1.5; }
        .curve-box { border: 1px solid #dfe7ef; border-radius: 8px; background: #fff; padding: 0.6rem; margin-top: 0.6rem; }
        .curve-meta { color: #556b7d; margin-top: 0.3rem; font-size: 0.92rem; }
        .curve-axis-label { fill: #7a8b99; font-size: 11px; }
        .eval-box { margin-top: 1.2rem; padding: 0.9rem; border: 1px solid #e1e8ef; border-radius: 8px; background: #fbfdff; text-align: left; }
        .eval-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.6rem; }
        .eval-actions button { margin-top: 0; }
        .eval-result { margin-top: 0.8rem; border: 1px solid #e5edf5; border-radius: 8px; padding: 0.7rem; background: #fff; }
        .eval-item { margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px dashed #e6edf4; }
        .eval-item:first-child { margin-top: 0; padding-top: 0; border-top: none; }
        #recognized-preview { margin-top: 0.8rem; color: #555; text-align: left; white-space: pre-wrap; min-height: 2rem; }
        .upload-box { border: 2px dashed #c9d6e2; border-radius: 8px; padding: 1rem; background: #f8fbff; text-align: center; color: #4b5f73; }
        .upload-box.dragover { border-color: #3498db; background: #edf6ff; }
        .upload-meta { margin-top: 0.5rem; color: #2c3e50; font-size: 0.95rem; }
        .listening { animation: pulse 1.5s infinite; color: #e74c3c; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container" id="setup-screen">
    <h1>面试配置</h1>
    <div class="form-group">
        <label>Obsidian 笔记文件夹</label>
        <input type="file" id="notes-folder-input" webkitdirectory directory multiple class="hidden" onchange="handleNotesFolderChange(event)">
        <button type="button" onclick="openNotesFolderPicker()">选择笔记文件夹</button>
        <div class="upload-meta" id="notes-folder-status">未选择文件夹</div>
    </div>
    <div class="form-group">
        <label>忽略目录（逗号分隔）</label>
        <input type="text" id="ignoreDirs" value=".obsidian,.trash,.git,.claude,node_modules" placeholder=".obsidian,.trash,.git,.claude,node_modules">
    </div>
    <button onclick="ingestNotes()">同步笔记</button>
    <div class="form-group" style="margin-top: 1.5rem;">
        <label>简历上传（PDF）</label>
        <input type="file" id="resume-file-input" accept=".pdf" class="hidden" onchange="handleResumeInputChange(event)">
        <div id="resume-dropzone" class="upload-box">
            拖拽 PDF 到这里，或
            <button type="button" onclick="openResumePicker()">选择文件</button>
            <div class="upload-meta" id="resume-upload-status">未上传简历</div>
        </div>
    </div>
    <div class="form-group">
        <label>面试主题</label>
        <input type="text" id="topic" placeholder="Java Concurrency">
    </div>
    <div class="form-group">
        <label>题目数量</label>
        <input type="number" id="questionCount" min="1" max="20" value="5">
    </div>
    <div class="eval-box">
        <label>检索评测（离线）</label>
        <input type="file" id="eval-file-input" accept=".csv" class="hidden" onchange="runEvalByCsv(event)">
        <div class="eval-actions">
            <button type="button" onclick="runDefaultRetrievalEval()">运行默认评测集</button>
            <button type="button" onclick="openEvalCsvPicker()">上传 CSV 评测集</button>
        </div>
        <div class="upload-meta" id="eval-status">未运行评测</div>
        <div id="eval-result" class="eval-result hidden"></div>
    </div>
    <div class="form-group">
        <label>语音调试</label>
        <button type="button" onclick="requestMicPermission()">获取麦克风权限</button>
        <button type="button" onclick="playTestAudio()">测试播放语音</button>
        <div id="voice-debug-status" style="margin-top:8px;color:#7f8c8d;">未检测</div>
    </div>
    <button onclick="startInterview()">开始面试</button>
</div>

<div class="container hidden" id="interview-screen">
    <div id="score-area">
        <div>当前平均分：<span id="avg-score">0</span></div>
        <div class="score-bar"><div class="score-fill" id="score-fill"></div></div>
        <div id="feedback-text">加油！你一定可以！</div>
        <div id="evidence-text" style="margin-top:0.4rem;color:#4b6275;font-size:0.92rem;"></div>
        <div id="progress-text">答题进度：0 / 5</div>
    </div>

    <div id="question-area">
        <div id="question-text">正在等待题目...</div>
        <div id="recognized-preview">识别文本：</div>
    </div>

    <div id="timer">00:15</div>
    <div id="status">准备就绪</div>

    <button id="action-btn" onclick="skipTimer()">立即作答</button>
    <div id="final-report" class="hidden"></div>
</div>

<script>
    let sessionId = null;
    let thinkingTimerInterval;
    let answerTimerInterval;
    let recognition;
    let isListening = false;
    let micStream = null;
    let hasMicPermission = false;
    let pendingTranscript = "";
    let isStoppingByUser = false;
    let isSubmittingAnswer = false;
    let interviewFinished = false;
    let totalQuestions = 5;
    let selectedResumePath = "";
    let selectedNotesFiles = [];
    let selectedNotesFolderName = "";
    let isResumeUploading = false;
    let isEvalRunning = false;
    let currentTopic = "";
    // 作答阶段剩余秒数：识别中断恢复时沿用该值，保证倒计时连续。
    let answerLeftSeconds = 0;
    const THINKING_SECONDS = 15;
    const ANSWER_SECONDS = 300;

    if ('webkitSpeechRecognition' in window) {
        recognition = new webkitSpeechRecognition();
        recognition.continuous = true;
        recognition.lang = 'zh-CN';
        recognition.interimResults = true;
        recognition.maxAlternatives = 3;

        recognition.onstart = function() {
            isListening = true;
            if (!pendingTranscript) {
                document.getElementById('recognized-preview').innerText = "识别文本：";
            }
            document.getElementById('status').innerText = "正在听你回答...";
            document.getElementById('status').classList.add('listening');
            document.getElementById('action-btn').innerText = "结束作答";
            document.getElementById('action-btn').onclick = stopRecording;
        };

        recognition.onend = function() {
            isListening = false;
            document.getElementById('status').classList.remove('listening');
            if (isSubmittingAnswer) {
                return;
            }
            // 非主动停止且仍在5分钟窗口内：自动重启识别，不重置计时。
            if (!isStoppingByUser && answerLeftSeconds > 0 && !interviewFinished) {
                document.getElementById('status').innerText = "暂未识别到回答，继续计时中...";
                startRecording(false);
                return;
            }
            const answer = normalizeTechTerms((pendingTranscript || "").trim());
            if (answer) {
                document.getElementById('recognized-preview').innerText = `识别文本：${answer}`;
                isSubmittingAnswer = true;
                submitAnswer(answer).finally(() => {
                    isSubmittingAnswer = false;
                });
            } else {
                const fallbackAnswer = "（未识别到语音回答）";
                document.getElementById('recognized-preview').innerText = `识别文本：${fallbackAnswer}`;
                document.getElementById('status').innerText = "未识别到回答，按空回答提交";
                isSubmittingAnswer = true;
                submitAnswer(fallbackAnswer).finally(() => {
                    isSubmittingAnswer = false;
                });
            }
            isStoppingByUser = false;
        };

        recognition.onresult = function(event) {
            let finalText = "";
            let interimText = "";
            for (let i = 0; i < event.results.length; i++) {
                if (event.results[i].isFinal) {
                    finalText += pickBestAlternative(event.results[i]) + " ";
                } else {
                    interimText += event.results[i][0].transcript + " ";
                }
            }
            if (finalText.trim()) {
                pendingTranscript += finalText;
            }
            const preview = normalizeTechTerms(`${pendingTranscript} ${interimText}`.trim());
            document.getElementById('recognized-preview').innerText = `识别文本：${preview}`;
        };

        recognition.onerror = function() {
            isListening = false;
            document.getElementById('status').classList.remove('listening');
            if (!isStoppingByUser && answerLeftSeconds > 0 && !interviewFinished) {
                document.getElementById('status').innerText = "语音识别波动，继续计时中...";
                startRecording(false);
                return;
            }
            document.getElementById('status').innerText = "语音识别异常，按空回答提交";
        };
    } else {
        alert("当前浏览器不支持语音识别，请使用 Chrome。");
    }

    async function requestMicPermission() {
        try {
            if (!micStream) {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            }
            hasMicPermission = true;
            document.getElementById('voice-debug-status').innerText = "麦克风权限已获取";
            return true;
        } catch (e) {
            hasMicPermission = false;
            document.getElementById('voice-debug-status').innerText = "麦克风权限获取失败";
            return false;
        }
    }

    function playTestAudio() {
        const testText = "你好，这是语音播放测试。如果你能听到，说明扬声器功能正常。";
        speak(testText, () => {
            document.getElementById('voice-debug-status').innerText = "语音播放测试完成";
        });
    }

    async function ingestNotes() {
        const ignoreDirs = document.getElementById('ignoreDirs').value;
        if (!selectedNotesFiles.length) {
            alert("请先选择笔记文件夹");
            return;
        }
        
        document.getElementById('status').innerText = "正在同步笔记...";
        const formData = new FormData();
        for (const file of selectedNotesFiles) {
            formData.append("files", file);
            formData.append("relativePaths", file.webkitRelativePath || file.name);
        }
        formData.append("folderName", selectedNotesFolderName || "selected-folder");
        formData.append("ignoreDirs", ignoreDirs || "");
        const res = await fetch('/api/ingest-files', {
            method: 'POST',
            body: formData
        });
        const data = await res.json();
        if (!res.ok) {
            document.getElementById('status').innerText = "同步失败";
            alert(data.message || "同步失败，请检查配置");
            return;
        }
        document.getElementById('status').innerText = "笔记同步完成";
        alert(data.message || "笔记同步完成！");
    }

    function openEvalCsvPicker() {
        document.getElementById('eval-file-input').click();
    }

    async function runDefaultRetrievalEval() {
        if (isEvalRunning) {
            return;
        }
        isEvalRunning = true;
        const status = document.getElementById('eval-status');
        status.innerText = "正在运行默认评测集...";
        try {
            const res = await fetch('/api/observability/retrieval-eval');
            const data = await res.json();
            if (!res.ok) {
                status.innerText = "默认评测失败";
                alert(data.message || "默认评测失败");
                return;
            }
            status.innerText = "默认评测完成";
            renderEvalResult(data);
        } catch (e) {
            status.innerText = "默认评测失败";
            alert("默认评测请求失败，请稍后重试");
        } finally {
            isEvalRunning = false;
        }
    }

    async function runEvalByCsv(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) {
            return;
        }
        if (isEvalRunning) {
            return;
        }
        isEvalRunning = true;
        const status = document.getElementById('eval-status');
        status.innerText = `正在上传并运行评测：${file.name}`;
        try {
            const formData = new FormData();
            formData.append("file", file);
            const res = await fetch('/api/observability/retrieval-eval/upload', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();
            if (!res.ok) {
                status.innerText = "CSV评测失败";
                alert(data.message || "CSV评测失败");
                return;
            }
            status.innerText = `CSV评测完成：${file.name}`;
            renderEvalResult(data);
        } catch (e) {
            status.innerText = "CSV评测失败";
            alert("CSV评测请求失败，请稍后重试");
        } finally {
            isEvalRunning = false;
            event.target.value = "";
        }
    }

    function renderEvalResult(data) {
        const box = document.getElementById('eval-result');
        if (!box) {
            return;
        }
        const total = Number(data.totalCases || 0);
        const hit = Number(data.hitCases || 0);
        const hitRate = Number(data.hitRate || 0);
        const results = Array.isArray(data.results) ? data.results : [];
        const rows = results.map(item => {
            const snippets = Array.isArray(item.retrievedSnippets) ? item.retrievedSnippets.slice(0, 2) : [];
            const snippetText = snippets.length ? snippets.map(v => `- ${escapeHtml(v)}`).join("<br>") : "无";
            const hitTag = item.hit ? "✅ 命中" : "❌ 未命中";
            return `
                <div class="eval-item">
                    <div><strong>${hitTag}</strong> ｜ 查询：${escapeHtml(item.query || "")}</div>
                    <div>关键词：${escapeHtml((item.expectedKeywords || []).join("、")) || "无"}</div>
                    <div>检索片段：<br>${snippetText}</div>
                </div>
            `;
        }).join("");
        box.classList.remove('hidden');
        box.innerHTML = `
            <div><strong>总用例：</strong>${total} ｜ <strong>命中：</strong>${hit} ｜ <strong>命中率：</strong>${(hitRate * 100).toFixed(1)}%</div>
            ${rows || "<div class='eval-item'>暂无逐题结果</div>"}
        `;
    }

    async function startInterview() {
        const topic = document.getElementById('topic').value;
        currentTopic = topic;
        const resumePath = selectedResumePath;
        const questionCountInput = Number.parseInt(document.getElementById('questionCount').value, 10);
        const selectedQuestionCount = Number.isNaN(questionCountInput) ? 5 : Math.min(Math.max(questionCountInput, 1), 20);
        if (!topic) {
            alert("请输入面试主题");
            return;
        }
        if (!resumePath) {
            alert("请先拖拽或选择并上传 PDF 简历");
            return;
        }
        if (isResumeUploading) {
            alert("简历还在上传中，请稍后再开始面试");
            return;
        }
        if (!hasMicPermission) {
            const ok = await requestMicPermission();
            if (!ok) {
                alert("请先允许麦克风权限，再开始面试");
                return;
            }
        }
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('interview-screen').classList.remove('hidden');

        const res = await fetch('/api/start', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({topic, resumePath, totalQuestions: selectedQuestionCount})
        });
        const data = await res.json();
        sessionId = data.id;
        totalQuestions = data.totalQuestions || selectedQuestionCount;
        document.getElementById('progress-text').innerText = `答题进度：0 / ${totalQuestions}`;
        
        handleNewQuestion(data.currentQuestion);
    }

    function handleNewQuestion(text) {
        if (interviewFinished) {
            return;
        }
        document.getElementById('question-text').innerText = text;
        document.getElementById('status').innerText = "AI 正在读题...";
        speak(text, () => {
            startThinkingTimer();
        });
    }

    function speak(text, callback) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'zh-CN';
        utterance.onend = callback;
        window.speechSynthesis.speak(utterance);
    }

    function startThinkingTimer() {
        let timeLeft = THINKING_SECONDS;
        document.getElementById('timer').innerText = formatTime(timeLeft);
        document.getElementById('status').innerText = "思考时间...";
        document.getElementById('action-btn').innerText = "立即作答";
        document.getElementById('action-btn').onclick = skipTimer;
        document.getElementById('action-btn').disabled = false;

        clearInterval(thinkingTimerInterval);
        thinkingTimerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = formatTime(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(thinkingTimerInterval);
                startRecording();
            }
        }, 1000);
    }

    function skipTimer() {
        clearInterval(thinkingTimerInterval);
        startRecording();
    }

    function startRecording(resetTimer = true) {
        if (!recognition) {
            alert("当前浏览器不支持语音识别，请使用 Chrome。");
            return;
        }
        if (isListening) {
            return;
        }
        // resetTimer=false 用于异常恢复，不清空倒计时与既有识别文本。
        if (resetTimer) {
            pendingTranscript = "";
            document.getElementById('recognized-preview').innerText = "识别文本：";
        }
        isStoppingByUser = false;
        if (resetTimer) {
            answerLeftSeconds = ANSWER_SECONDS;
            document.getElementById('timer').innerText = formatTime(answerLeftSeconds);
        }
        document.getElementById('status').innerText = "正在听你回答...";
        document.getElementById('action-btn').innerText = "结束作答";
        document.getElementById('action-btn').onclick = stopRecording;
        if (resetTimer) {
            clearInterval(answerTimerInterval);
            answerTimerInterval = setInterval(() => {
                answerLeftSeconds--;
                document.getElementById('timer').innerText = formatTime(answerLeftSeconds);
                if (answerLeftSeconds <= 0) {
                    clearInterval(answerTimerInterval);
                    stopRecording();
                }
            }, 1000);
        }
        recognition.start();
    }

    function stopRecording() {
        if (!recognition || !isListening) {
            return;
        }
        isStoppingByUser = true;
        clearInterval(answerTimerInterval);
        document.getElementById('status').innerText = "正在结束录音...";
        recognition.stop();
    }

    function formatTime(seconds) {
        const m = String(Math.floor(seconds / 60)).padStart(2, '0');
        const s = String(seconds % 60).padStart(2, '0');
        return `${m}:${s}`;
    }

    async function submitAnswer(answer) {
        if (interviewFinished) {
            return;
        }
        const normalizedAnswer = normalizeTechTerms(answer);
        if (!normalizedAnswer) {
            document.getElementById('status').innerText = "未识别到有效回答";
            document.getElementById('action-btn').disabled = false;
            document.getElementById('action-btn').innerText = "重新作答";
            document.getElementById('action-btn').onclick = startRecording;
            return;
        }
        document.getElementById('action-btn').disabled = true;
        document.getElementById('status').innerText = "正在分析回答...";
        try {
            const res = await fetch('/api/answer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId, answer: normalizedAnswer})
            });
            const data = await res.json();
            if (!res.ok) {
                document.getElementById('status').innerText = "分析失败";
                alert(data.message || "回答分析失败，请重试");
                document.getElementById('action-btn').disabled = false;
                document.getElementById('action-btn').innerText = "重新作答";
                document.getElementById('action-btn').onclick = startRecording;
                return;
            }

            document.getElementById('avg-score').innerText = data.averageScore.toFixed(1);
            document.getElementById('score-fill').style.width = data.averageScore + "%";
            
            let feedbackMsg = "";
            if (data.averageScore < 60) feedbackMsg = "别灰心，再接再厉！💪";
            else if (data.averageScore < 80) feedbackMsg = "不错哦，离高薪更近一步了！🚀";
            else feedbackMsg = "哇塞，你就是未来的高薪大佬！🌟";
            document.getElementById('feedback-text').innerText = feedbackMsg;
            const citations = Array.isArray(data.citations) ? data.citations : [];
            const conflicts = Array.isArray(data.conflicts) ? data.conflicts : [];
            const evidenceSummary = `证据引用：${citations.length} 条` + (conflicts.length ? ` ｜ 冲突：${conflicts.length} 条` : " ｜ 冲突：0 条");
            document.getElementById('evidence-text').innerText = evidenceSummary;
            const levelText = data.difficultyLevel ? `｜当前难度：${data.difficultyLevel}` : "";
            document.getElementById('progress-text').innerText = `答题进度：${data.answeredCount} / ${data.totalQuestions}${levelText}`;

            if (data.finished) {
                await finishInterview();
            } else {
                document.getElementById('action-btn').disabled = false;
                handleNewQuestion(data.nextQuestion);
            }
        } catch (e) {
            document.getElementById('status').innerText = "网络异常";
            alert("请求失败，请检查网络后重试");
            document.getElementById('action-btn').disabled = false;
            document.getElementById('action-btn').innerText = "重新作答";
            document.getElementById('action-btn').onclick = startRecording;
        } finally {
            isSubmittingAnswer = false;
        }
    }

    async function finishInterview() {
        interviewFinished = true;
        clearInterval(thinkingTimerInterval);
        clearInterval(answerTimerInterval);
        document.getElementById('timer').innerText = "00:00";
        document.getElementById('status').innerText = "正在生成最终总结...";
        document.getElementById('question-text').innerText = "本轮面试已完成";
        document.getElementById('action-btn').disabled = true;
        document.getElementById('action-btn').innerText = "面试已结束";
        document.getElementById('action-btn').onclick = null;
        window.speechSynthesis.cancel();
        try {
            const res = await fetch('/api/report', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({sessionId})
            });
            const data = await res.json();
            if (!res.ok) {
                throw new Error(data.message || "总结生成失败");
            }
            await renderFinalReport(data);
            document.getElementById('status').innerText = "总结已生成";
            speak("面试总结已生成，请查看页面报告。");
        } catch (e) {
            document.getElementById('status').innerText = "总结生成失败";
            alert(e.message || "总结生成失败，请稍后重试");
        }
    }

    async function renderFinalReport(data) {
        const report = document.getElementById('final-report');
        report.classList.remove('hidden');
        report.innerHTML = `
            <h3>最终总结</h3>
            <p>${escapeHtml(data.summary || "")}</p>
            <h3>回答不全</h3>
            <p>${escapeHtml(data.incomplete || "")}</p>
            <h3>回答不好</h3>
            <p>${escapeHtml(data.weak || "")}</p>
            <h3>回答错误</h3>
            <p>${escapeHtml(data.wrong || "")}</p>
            <h3>建议补充到 Obsidian</h3>
            <p>${escapeHtml(data.obsidianUpdates || "")}</p>
            <h3>下轮针对性训练</h3>
            <p>${escapeHtml(data.nextFocus || "")}</p>
            <h3>整体评分</h3>
            <p>平均分：${Number(data.averageScore || 0).toFixed(1)}（共 ${data.answeredCount || 0} 题）</p>
            <h3>主题能力曲线</h3>
            <div id="topic-curve-box" class="curve-box">正在加载能力曲线...</div>
        `;
        await renderTopicCapabilityCurve();
    }

    async function renderTopicCapabilityCurve() {
        const box = document.getElementById('topic-curve-box');
        if (!box) {
            return;
        }
        if (!currentTopic) {
            box.innerText = "未选择主题，无法展示能力曲线。";
            return;
        }
        try {
            const res = await fetch(`/api/profile/topic-capability?topic=${encodeURIComponent(currentTopic)}`);
            const data = await res.json();
            if (!res.ok) {
                box.innerText = "能力曲线加载失败";
                return;
            }
            const scores = Array.isArray(data.scores) ? data.scores : [];
            if (!scores.length) {
                box.innerText = "该主题暂无历史能力数据，完成多轮面试后将自动生成。";
                return;
            }
            const svg = buildCurveSvg(scores);
            const avg = Number(data.averageScore || 0).toFixed(1);
            const latest = Number(scores[scores.length - 1] || 0).toFixed(1);
            const trend = calcTrend(scores);
            box.innerHTML = `
                ${svg}
                <div class="curve-meta">主题：${escapeHtml(data.topic || currentTopic)}</div>
                <div class="curve-meta">平均能力值：${avg} ｜ 最近一次：${latest} ｜ 趋势：${trend}</div>
            `;
        } catch (e) {
            box.innerText = "能力曲线加载失败，请稍后重试。";
        }
    }

    function buildCurveSvg(scores) {
        const width = 520;
        const height = 180;
        const padLeft = 34;
        const padRight = 12;
        const padTop = 10;
        const padBottom = 24;
        const minY = 0;
        const maxY = 100;
        const drawableW = width - padLeft - padRight;
        const drawableH = height - padTop - padBottom;
        const step = scores.length <= 1 ? 0 : drawableW / (scores.length - 1);
        const points = scores.map((score, idx) => {
            const x = padLeft + idx * step;
            const y = padTop + (maxY - Math.max(minY, Math.min(maxY, Number(score)))) / (maxY - minY) * drawableH;
            return `${x.toFixed(1)},${y.toFixed(1)}`;
        }).join(" ");
        return `
            <svg viewBox="0 0 ${width} ${height}" width="100%" height="180" role="img" aria-label="主题能力曲线图">
                <line x1="${padLeft}" y1="${padTop}" x2="${padLeft}" y2="${height - padBottom}" stroke="#d6e0ea" />
                <line x1="${padLeft}" y1="${height - padBottom}" x2="${width - padRight}" y2="${height - padBottom}" stroke="#d6e0ea" />
                <text x="${padLeft - 18}" y="${padTop + 4}" class="curve-axis-label">100</text>
                <text x="${padLeft - 12}" y="${height - padBottom + 4}" class="curve-axis-label">0</text>
                <polyline points="${points}" fill="none" stroke="#2e86de" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"></polyline>
            </svg>
        `;
    }

    function calcTrend(scores) {
        if (!scores || scores.length < 2) {
            return "稳定";
        }
        const first = Number(scores[0] || 0);
        const last = Number(scores[scores.length - 1] || 0);
        const delta = last - first;
        if (delta >= 5) {
            return "上升";
        }
        if (delta <= -5) {
            return "下降";
        }
        return "稳定";
    }

    function escapeHtml(text) {
        return String(text)
            .replaceAll('&', '&amp;')
            .replaceAll('<', '&lt;')
            .replaceAll('>', '&gt;')
            .replaceAll('"', '&quot;')
            .replaceAll("'", '&#39;');
    }

    function pickBestAlternative(result) {
        const alternatives = [];
        for (let i = 0; i < result.length; i++) {
            alternatives.push(result[i].transcript || "");
        }
        if (alternatives.length === 0) {
            return "";
        }
        let best = alternatives[0];
        let bestScore = scoreTechTerms(normalizeTechTerms(best));
        for (let i = 1; i < alternatives.length; i++) {
            const normalized = normalizeTechTerms(alternatives[i]);
            const score = scoreTechTerms(normalized);
            if (score > bestScore) {
                best = alternatives[i];
                bestScore = score;
            }
        }
        return best;
    }

    function scoreTechTerms(text) {
        const keywords = ["MySQL", "Redis", "HashMap", "JVM", "Java", "Spring", "HTTP", "TCP", "GC"];
        let score = 0;
        for (const keyword of keywords) {
            if (text.includes(keyword)) {
                score += 1;
            }
        }
        return score;
    }

    function normalizeTechTerms(text) {
        if (!text) {
            return "";
        }
        return text
            .replaceAll(/my\s*sql/gi, "MySQL")
            .replaceAll(/mysql/gi, "MySQL")
            .replaceAll(/瑞迪斯|锐迪斯|re\s*dis/gi, "Redis")
            .replaceAll(/redis/gi, "Redis")
            .replaceAll(/hash\s*map/gi, "HashMap")
            .replaceAll(/哈希\s*map/gi, "HashMap")
            .replaceAll(/j\s*v\s*m/gi, "JVM")
            .replaceAll(/jvm/gi, "JVM")
            .replaceAll(/s\s*q\s*l/gi, "SQL")
            .trim();
    }

    function openResumePicker() {
        document.getElementById('resume-file-input').click();
    }

    async function handleResumeInputChange(event) {
        const file = event.target.files && event.target.files[0];
        if (!file) {
            return;
        }
        await uploadResumeFile(file);
        event.target.value = "";
    }

    function openNotesFolderPicker() {
        document.getElementById('notes-folder-input').click();
    }

    function handleNotesFolderChange(event) {
        const files = Array.from(event.target.files || []);
        selectedNotesFiles = files.filter(file => {
            const relativePath = file.webkitRelativePath || file.name;
            return relativePath.toLowerCase().endsWith(".md");
        });
        const firstPath = files[0] && files[0].webkitRelativePath ? files[0].webkitRelativePath : "";
        selectedNotesFolderName = firstPath ? firstPath.split("/")[0] : "selected-folder";
        document.getElementById('notes-folder-status').innerText = selectedNotesFiles.length
            ? `已选择：${selectedNotesFolderName}（${selectedNotesFiles.length} 个 .md 文件）`
            : "所选文件夹中没有 .md 文件";
        event.target.value = "";
    }

    async function uploadResumeFile(file) {
        if (!file.name.toLowerCase().endsWith(".pdf")) {
            alert("仅支持上传 PDF 简历");
            return;
        }
        if (file.size > 10 * 1024 * 1024) {
            alert("简历文件过大，请上传 10MB 以内 PDF");
            return;
        }
        const status = document.getElementById('resume-upload-status');
        const startButton = document.querySelector('#setup-screen button[onclick="startInterview()"]');
        isResumeUploading = true;
        if (startButton) {
            startButton.disabled = true;
        }
        status.innerText = "正在上传简历...";
        const formData = new FormData();
        formData.append("file", file);
        try {
            const res = await fetch('/api/resume/upload', {
                method: 'POST',
                body: formData
            });
            const raw = await res.text();
            const data = raw ? JSON.parse(raw) : {};
            if (!res.ok) {
                throw new Error(data.message || "上传失败");
            }
            selectedResumePath = data.resumePath || "";
            status.innerText = `已上传：${data.fileName || file.name}`;
        } catch (e) {
            selectedResumePath = "";
            status.innerText = "上传失败，请重试";
            alert(e.message || "简历上传失败");
        } finally {
            isResumeUploading = false;
            if (startButton) {
                startButton.disabled = false;
            }
        }
    }

    function initDropzone() {
        const dropzone = document.getElementById('resume-dropzone');
        dropzone.addEventListener('dragover', event => {
            event.preventDefault();
            dropzone.classList.add('dragover');
        });
        dropzone.addEventListener('dragleave', () => {
            dropzone.classList.remove('dragover');
        });
        dropzone.addEventListener('drop', async event => {
            event.preventDefault();
            dropzone.classList.remove('dragover');
            const file = event.dataTransfer && event.dataTransfer.files ? event.dataTransfer.files[0] : null;
            if (!file) {
                return;
            }
            await uploadResumeFile(file);
        });
    }

    initDropzone();
</script>
