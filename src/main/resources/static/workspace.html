<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#e7e8e9",
                        "tertiary-container": "#8f3400",
                        "surface-container-highest": "#e1e3e4",
                        "on-surface": "#191c1d",
                        "on-tertiary-container": "#ffb393",
                        "error-container": "#ffdad6",
                        "surface": "#f8f9fa",
                        "primary-container": "#4338ca",
                        "on-secondary-fixed": "#16124c",
                        "secondary-container": "#c0bdff",
                        "on-error-container": "#93000a",
                        "inverse-surface": "#2e3132",
                        "on-primary-container": "#c1beff",
                        "on-primary-fixed-variant": "#372abf",
                        "on-background": "#191c1d",
                        "background": "#f8f9fa",
                        "primary": "#2a14b4",
                        "on-error": "#ffffff",
                        "outline-variant": "#c7c4d7",
                        "outline": "#777586",
                        "surface-dim": "#d9dadb",
                        "surface-variant": "#e1e3e4",
                        "surface-bright": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed": "#360f00",
                        "secondary": "#5a5893",
                        "inverse-on-surface": "#f0f1f2",
                        "inverse-primary": "#c3c0ff",
                        "primary-fixed": "#e3dfff",
                        "surface-container-low": "#f3f4f5",
                        "on-primary": "#ffffff",
                        "tertiary-fixed-dim": "#ffb597",
                        "secondary-fixed": "#e3dfff",
                        "tertiary-fixed": "#ffdbcd",
                        "on-secondary-fixed-variant": "#42407a",
                        "on-primary-fixed": "#100069",
                        "surface-container-lowest": "#ffffff",
                        "surface-container": "#edeeef",
                        "surface-tint": "#5148d7",
                        "on-secondary-container": "#4c4a84",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "secondary-fixed-dim": "#c3c0ff",
                        "on-surface-variant": "#464554",
                        "tertiary": "#692400",
                        "primary-fixed-dim": "#c3c0ff",
                        "error": "#ba1a1a"
                    },
                    fontFamily: {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
        }
        .bg-pattern {
            background-image: radial-gradient(circle at center, #4f46e5 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.05;
        }
    </style>
</head>
<body class="bg-surface text-on-surface">

<!-- 动态加载侧边栏 -->
<script src="layout.js"></script>

<!-- Main Content Canvas -->
<main class="ml-64 min-h-[calc(100vh)] flex flex-col bg-slate-50 relative z-10">
<!-- Header -->
<header class="sticky top-0 z-40 bg-white/80 backdrop-blur-xl border-b border-slate-100 flex justify-between items-center px-8 py-4 w-full shadow-sm">
<div class="flex flex-col">
<div class="flex items-center gap-2">
<h2 class="text-xl font-bold text-slate-900 font-headline">扩展空间 / Workspace</h2>
<span class="px-2 py-0.5 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-bold tracking-widest border border-indigo-100">CONFIG</span>
</div>
<p class="text-xs text-slate-500 mt-1">拖拽卡片调整顺序、管理模块位置与启用状态</p>
</div>
<div class="flex items-center gap-6">
<div class="flex items-center bg-slate-100 p-1 rounded-lg">
<button class="px-4 py-1.5 text-xs font-bold rounded-md transition-all bg-white text-indigo-700 shadow-sm">全部模块 (<span id="total-count">0</span>)</button>
</div>
<button id="save-btn" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-lg text-sm font-bold transition-all active:scale-95 shadow-md">
<span class="material-symbols-outlined text-lg" data-icon="save">save</span>
<span>保存布局</span>
</button>
</div>
</header>

<!-- Bento Grid Main Area -->
<div class="p-8 flex-1 bg-slate-50">
<div id="card-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto">
    <!-- Cards will be injected here via JS -->
</div>
</div>
</main>

<!-- Success Toast -->
<div class="fixed bottom-8 right-8 z-[100] flex flex-col gap-3" id="toast-container"></div>

<script>
let allMenus = [];

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/api/settings/menu');
        if (res.ok) {
            allMenus = await res.json();
            renderCards();
        }
    } catch (e) {
        console.error("Failed to load menus", e);
    }
    
    document.getElementById('save-btn').addEventListener('click', saveLayout);
});

function renderCards() {
    const container = document.getElementById('card-container');
    document.getElementById('total-count').innerText = allMenus.length;
    container.innerHTML = '';
    
    allMenus.forEach((menu, index) => {
        const isSidebar = menu.position === 'SIDEBAR';
        const badgeColor = menu.beta ? 'amber' : 'indigo';
        const badgeText = menu.beta ? 'Beta' : '核心';
        
        // 移除蒙层提示，改用卡片自身的透明度和边框颜色来区分状态
        const overlayHtml = '';
        
        // 当处于 EXTENSION 状态时，卡片整体变淡，且没有阴影
        const cardOpacityClass = isSidebar ? 'opacity-100 shadow-sm border-slate-100' : 'opacity-60 shadow-none border-dashed border-slate-300 bg-slate-50/50';

        const btnClass = isSidebar 
            ? 'hover:bg-slate-100 text-slate-600 bg-white border-slate-200 shadow-sm' 
            : 'bg-indigo-50 text-indigo-700 border-indigo-100 shadow-sm';
        
        const btnText = isSidebar ? '移至扩展' : '移回侧栏';

        const cardHtml = `
        <div class="glass-card rounded-2xl p-6 flex flex-col group relative overflow-hidden bg-white border transition-all duration-300 ${cardOpacityClass}" data-index="${index}">
            ${overlayHtml}
            <div class="flex justify-between items-start mb-6 z-20">
                <div class="p-3 bg-${badgeColor}-50 rounded-xl">
                    <span class="material-symbols-outlined text-${badgeColor}-600 text-2xl">${menu.icon}</span>
                </div>
                <span class="px-2.5 py-1 rounded-full bg-${badgeColor}-50 text-${badgeColor}-700 text-[10px] font-extrabold tracking-wider border border-${badgeColor}-100">${badgeText}</span>
            </div>
            <h3 class="text-lg font-bold mb-2 text-slate-900 z-20">${menu.title}</h3>
            <p class="text-sm leading-relaxed mb-8 flex-1 text-slate-500 z-20">${menu.description}</p>
            <div class="flex items-center gap-3 z-20">
                <button onclick="togglePosition(${index})" class="flex-1 px-4 py-2.5 text-xs font-bold rounded-xl border transition-all ${btnClass}">
                    ${btnText}
                </button>
                <a href="${menu.url}" class="flex items-center justify-center w-12 h-10 ${isSidebar ? 'bg-indigo-600 hover:bg-indigo-700 text-white' : 'bg-slate-200 text-slate-400 cursor-not-allowed'} rounded-xl transition-all shadow-sm pointer-events-${isSidebar ? 'auto' : 'none'}">
                    <span class="material-symbols-outlined">arrow_outward</span>
                </a>
            </div>
        </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
    });
}

function togglePosition(index) {
    const menu = allMenus[index];
    menu.position = menu.position === 'SIDEBAR' ? 'EXTENSION' : 'SIDEBAR';
    renderCards(); // 重新渲染触发视觉变化
}

async function saveLayout() {
    const btn = document.getElementById('save-btn');
    const originalContent = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> 保存中...`;

    try {
        const res = await fetch('/api/settings/menu/layout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(allMenus)
        });
        
        if (res.ok) {
            showToast('布局已保存，即将刷新侧边栏', 'success');
            setTimeout(() => window.location.reload(), 1500); // 刷新页面以重新加载 layout.js
        }
    } catch (e) {
        showToast('保存失败', 'error');
    } finally {
        btn.innerHTML = originalContent;
        btn.disabled = false;
    }
}

function showToast(message, type) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `flex items-center gap-3 bg-slate-800 px-6 py-4 rounded-xl shadow-2xl border-l-4 border-emerald-500 animate-fade-in text-white`;
    toast.innerHTML = `<span class="material-symbols-outlined text-emerald-400">check_circle</span><p class="text-sm font-semibold">${message}</p>`;
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}
</script>
</body></html>
